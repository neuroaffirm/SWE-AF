services:
  # --- Control Plane (public Web Service — API gateway for SWE-AF) ---
  - type: web
    name: swe-af-control-plane
    runtime: image
    image:
      url: ghcr.io/agent-field/agentfield-control-plane:latest
    healthCheckPath: /health
    disk:
      name: agentfield-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: AGENTFIELD_HTTP_ADDR
        value: 0.0.0.0:8080
      - key: AGENTFIELD_STORAGE_MODE
        value: local
      - key: PORT
        value: "8080"

  # --- SWE Agent (public Web Service) ---
  - type: web
    name: swe-af-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: workspaces
      mountPath: /workspaces
      sizeGB: 10
    envVars:
      - key: AGENTFIELD_SERVER
        value: https://swe-af-control-plane.onrender.com
      - key: NODE_ID
        value: swe-planner
      - key: PORT
        value: "8003"
      - key: AGENT_CALLBACK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GH_TOKEN
        sync: false
